services:
  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_store:/app/chroma_store
      - ./data:/app/data:ro
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  chroma_store:
  ollama_models:
